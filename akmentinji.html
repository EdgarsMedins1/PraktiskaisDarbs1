<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akmentiņi</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #f5f5f5; color: #111; }
#app { padding: 1.5rem; max-width: 680px; margin: 0 auto; }
h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
.scoreboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.score-card { background: #eee; border-radius: 8px; padding: 12px 16px; border: 2px solid transparent; }
.score-card.active { border: 2px solid #185FA5; }
.score-label { font-size: 12px; color: #666; margin-bottom: 4px; }
.score-name { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
.score-pts { font-size: 24px; font-weight: 500; }
.score-taken { font-size: 12px; color: #666; margin-top: 2px; }
.stones-area { background: #eee; border-radius: 12px; padding: 1.25rem; margin-bottom: 1.25rem; text-align: center; }
.stones-count { font-size: 48px; font-weight: 500; line-height: 1; }
.stones-label { font-size: 13px; color: #666; margin-top: 4px; }
.stones-visual { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-top: 12px; min-height: 40px; }
.stone { width: 14px; height: 14px; border-radius: 50%; background: #888; }
.setup-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
.setup-row label { font-size: 14px; color: #666; white-space: nowrap; }
input[type=number] { width: 80px; padding: 6px 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; }
.btn { padding: 8px 20px; border-radius: 8px; border: 1px solid #ccc; background: #fff; color: #111; font-size: 14px; cursor: pointer; transition: background 0.15s; }
.btn:hover { background: #eee; }
.btn:active { transform: scale(0.98); }
.btn.primary { background: #185FA5; border-color: #185FA5; color: #fff; }
.btn.primary:hover { background: #0C447C; }
.btn.take { min-width: 100px; font-size: 16px; font-weight: 500; }
.move-btns { display: flex; gap: 12px; }
.log { background: #eee; border-radius: 8px; padding: 12px 16px; max-height: 180px; overflow-y: auto; margin-top: 1rem; }
.log-entry { font-size: 13px; color: #666; padding: 3px 0; border-bottom: 1px solid #ddd; }
.log-entry:last-child { border-bottom: none; }
.log-entry.p1 { color: #185FA5; }
.log-entry.p2 { color: #B85A30; }
.log-entry.system { color: #111; font-weight: 500; }
.result-box { text-align: center; padding: 2rem; background: #eee; border-radius: 12px; }
.result-title { font-size: 22px; font-weight: 500; margin-bottom: 8px; }
.result-scores { font-size: 15px; color: #666; margin-bottom: 1.25rem; }
.status-bar { font-size: 14px; color: #666; margin-bottom: 12px; min-height: 20px; }
</style>
</head>
<body>
<div id="app">
  <h1>Akmentiņi</h1>
  <p class="subtitle">Paņem 2 vai 3 akmentiņus. Pāra skaits galda — pretiniekam +2 pts.</p>

  <div id="setup-phase">
    <div class="setup-row">
      <label>Akmentiņu skaits (50–70):</label>
      <input type="number" id="stone-input" min="50" max="70" value="60" />
      <button class="btn primary" onclick="startGame()">Sākt spēli</button>
    </div>
  </div>

  <div id="game-phase" style="display:none">
    <div class="scoreboard">
      <div class="score-card" id="card-p1">
        <div class="score-label">Tu (P1)</div>
        <div class="score-name">Cilvēks</div>
        <div class="score-pts" id="p1-pts">0</div>
        <div class="score-taken" id="p1-taken">Paņemti: 0</div>
      </div>
      <div class="score-card" id="card-p2">
        <div class="score-label">Pretinieks (P2)</div>
        <div class="score-name">AI</div>
        <div class="score-pts" id="p2-pts">0</div>
        <div class="score-taken" id="p2-taken">Paņemti: 0</div>
      </div>
    </div>

    <div class="stones-area">
      <div class="stones-count" id="stones-disp">60</div>
      <div class="stones-label">akmentiņi uz galda</div>
      <div class="stones-visual" id="stones-vis"></div>
    </div>

    <div class="status-bar" id="status-bar">Tavs gājiens. Paņem 2 vai 3.</div>

    <div class="move-btns" id="move-btns">
      <button class="btn take" onclick="humanMove(2)">Paņemt 2</button>
      <button class="btn take" onclick="humanMove(3)">Paņemt 3</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <div id="result-phase" style="display:none">
    <div class="result-box">
      <div class="result-title" id="result-title"></div>
      <div class="result-scores" id="result-scores"></div>
      <button class="btn primary" onclick="resetGame()">Spēlēt vēlreiz</button>
    </div>
  </div>
</div>

<script>
let state = null;
const DEPTH = 16;

function gs(stonesLeft, p1Points, p2Points, p1Taken, p2Taken, p1Turn) {
  return { stonesLeft, p1Points, p2Points, p1Taken, p2Taken, p1Turn };
}

function applyMove(s, take) {
  const newStones = s.stonesLeft - take;
  let np1p = s.p1Points, np2p = s.p2Points;
  let np1t = s.p1Taken + (s.p1Turn ? take : 0);
  let np2t = s.p2Taken + (!s.p1Turn ? take : 0);
  if (newStones % 2 === 0) {
    if (s.p1Turn) np2p += 2; else np1p += 2;
  } else {
    if (s.p1Turn) np1p += 2; else np2p += 2;
  }
  return gs(newStones, np1p, np2p, np1t, np2t, !s.p1Turn);
}

function isTerminal(s) { return s.stonesLeft === 0; }
function finalP1(s) { return s.p1Points + s.p1Taken; }
function finalP2(s) { return s.p2Points + s.p2Taken; }

function possibleMoves(stonesLeft) {
  if (stonesLeft >= 3) return [2, 3];
  if (stonesLeft === 2) return [2];
  return [];
}

function heuristic(s) {
  const p1 = s.p1Points + s.p1Taken;
  const p2 = s.p2Points + s.p2Taken;
  const bias = s.p1Turn ? -1 : 1;
  return (p2 - p1) * 10 + bias;
}

function alphabeta(s, depth, alpha, beta) {
  if (isTerminal(s)) return finalP2(s) - finalP1(s);
  if (depth === 0) return heuristic(s);
  const moves = possibleMoves(s.stonesLeft);
  if (moves.length === 0) return finalP2(s) - finalP1(s);
  const maximizing = !s.p1Turn;
  if (maximizing) {
    let val = -Infinity;
    for (const m of moves) {
      val = Math.max(val, alphabeta(applyMove(s, m), depth - 1, alpha, beta));
      alpha = Math.max(alpha, val);
      if (alpha >= beta) break;
    }
    return val;
  } else {
    let val = Infinity;
    for (const m of moves) {
      val = Math.min(val, alphabeta(applyMove(s, m), depth - 1, alpha, beta));
      beta = Math.min(beta, val);
      if (alpha >= beta) break;
    }
    return val;
  }
}

function chooseMove(s) {
  let best = -1, bestVal = -Infinity;
  for (const m of possibleMoves(s.stonesLeft)) {
    const val = alphabeta(applyMove(s, m), DEPTH - 1, -Infinity, Infinity);
    if (val > bestVal) { bestVal = val; best = m; }
  }
  return best;
}

function addLog(msg, cls) {
  const log = document.getElementById('log');
  const div = document.createElement('div');
  div.className = 'log-entry ' + (cls || '');
  div.textContent = msg;
  log.prepend(div);
}

function renderStones(n) {
  const vis = document.getElementById('stones-vis');
  vis.innerHTML = '';
  const show = Math.min(n, 70);
  for (let i = 0; i < show; i++) {
    const d = document.createElement('div');
    d.className = 'stone';
    vis.appendChild(d);
  }
}

function updateUI() {
  document.getElementById('stones-disp').textContent = state.stonesLeft;
  document.getElementById('p1-pts').textContent = state.p1Points;
  document.getElementById('p2-pts').textContent = state.p2Points;
  document.getElementById('p1-taken').textContent = 'Paņemti: ' + state.p1Taken;
  document.getElementById('p2-taken').textContent = 'Paņemti: ' + state.p2Taken;
  renderStones(state.stonesLeft);
  document.getElementById('card-p1').className = 'score-card' + (state.p1Turn ? ' active' : '');
  document.getElementById('card-p2').className = 'score-card' + (!state.p1Turn ? ' active' : '');
  const btns = document.getElementById('move-btns');
  const btn3 = btns.children[1];
  btn3.disabled = state.stonesLeft < 3;
  btn3.style.opacity = state.stonesLeft < 3 ? '0.4' : '1';
}

function checkEnd() {
  if (isTerminal(state) || possibleMoves(state.stonesLeft).length === 0) {
    const f1 = finalP1(state), f2 = finalP2(state);
    document.getElementById('game-phase').style.display = 'none';
    document.getElementById('result-phase').style.display = 'block';
    let title, color;
    if (f1 > f2) { title = 'Tu uzvarēji!'; color = '#185FA5'; }
    else if (f2 > f1) { title = 'AI uzvarēja.'; color = '#B85A30'; }
    else { title = 'Neizšķirts!'; color = '#111'; }
    const rt = document.getElementById('result-title');
    rt.textContent = title;
    rt.style.color = color;
    document.getElementById('result-scores').textContent =
      'Tu: ' + f1 + ' pts  |  AI: ' + f2 + ' pts  (punkti + paņemtie akmentiņi)';
    return true;
  }
  return false;
}

function humanMove(take) {
  if (!state.p1Turn) return;
  if (take > state.stonesLeft) return;
  const after = state.stonesLeft - take;
  const parity = after % 2 === 0 ? 'Pāra skaits — AI +2 pts' : 'Nepāra skaits — tev +2 pts';
  state = applyMove(state, take);
  addLog('Tu paņēmi ' + take + '. ' + parity, 'p1');
  updateUI();
  if (checkEnd()) return;
  document.getElementById('status-bar').textContent = 'AI domā...';
  document.getElementById('move-btns').style.pointerEvents = 'none';
  setTimeout(() => {
    const m = chooseMove(state);
    const after2 = state.stonesLeft - m;
    const parity2 = after2 % 2 === 0 ? 'Pāra skaits — tev +2 pts' : 'Nepāra skaits — AI +2 pts';
    state = applyMove(state, m);
    addLog('AI paņēma ' + m + '. ' + parity2, 'p2');
    updateUI();
    document.getElementById('move-btns').style.pointerEvents = '';
    if (!checkEnd()) {
      document.getElementById('status-bar').textContent = 'Tavs gājiens. Paņem 2 vai 3.';
    }
  }, 400);
}

function startGame() {
  let n = parseInt(document.getElementById('stone-input').value);
  if (isNaN(n) || n < 50 || n > 70) {
    alert('Ievadi skaitli no 50 līdz 70!');
    return;
  }
  state = gs(n, 0, 0, 0, 0, true);
  document.getElementById('setup-phase').style.display = 'none';
  document.getElementById('game-phase').style.display = 'block';
  document.getElementById('log').innerHTML = '';
  addLog('Spēle sākta ar ' + n + ' akmentiņiem.', 'system');
  updateUI();
}

function resetGame() {
  document.getElementById('result-phase').style.display = 'none';
  document.getElementById('setup-phase').style.display = 'block';
  state = null;
}
</script>
</body>
</html>
